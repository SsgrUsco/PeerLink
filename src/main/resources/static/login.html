<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerLink | Login</title>
    <link rel="icon" href="/img/peerlink.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="peerlink-body bg-light" data-i18n-title="login_title">

<div class="position-absolute top-0 start-0 p-3 p-md-4 z-3">
    <a class="btn btn-white btn-sm rounded-pill px-3 py-2 shadow-sm border text-secondary text-decoration-none d-flex align-items-center gap-2 text-hover-success" href="/">
        <i class="bi bi-arrow-left"></i> <span data-i18n="action_back_home">Volver</span>
    </a>
</div>

<div class="position-absolute top-0 end-0 p-3 p-md-4 z-3">
    <div id="loginLanguageSelect" class="peerlink-language-select" data-language-dropdown>
        <button class="peerlink-language-toggle" type="button" aria-label="Language selector" data-i18n-aria-label="aria_language_selector" aria-haspopup="menu" aria-expanded="false">
            <i class="bi bi-translate peerlink-language-icon" aria-hidden="true"></i>
            <span data-language-current>ES</span>
        </button>
        <div class="peerlink-language-menu" role="menu">
            <button class="peerlink-language-option" type="button" role="menuitem" data-lang="es">ES</button>
            <button class="peerlink-language-option" type="button" role="menuitem" data-lang="en">EN</button>
            <button class="peerlink-language-option" type="button" role="menuitem" data-lang="pt">PT</button>
        </div>
    </div>
</div>

<main class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-3 py-md-4 auth-page-surface bg-light">

    <section class="card border-0 shadow-lg rounded-5 login-card-shell" style="max-width: 450px; width: 100%;">
        <div class="card-body p-3 p-sm-4">

            <div class="d-flex justify-content-center align-items-center mb-3">
                <a class="auth-brand-link text-decoration-none" href="/" aria-label="PeerLink" data-i18n-aria-label="aria_peerlink_home">
                    <img src="/img/peerlink.svg" alt="PeerLink" class="brand-logo brand-logo-auth" width="180" height="45" fetchpriority="high">
                </a>
            </div>

            <header class="text-center mb-3">
                <h1 class="h3 fw-bold mb-2 text-dark" data-i18n="login_welcome_title">Te damos la bienvenida</h1>
                <p class="text-secondary small mb-0" data-i18n="login_welcome_desc">Ingresa tus credenciales para continuar.</p>
            </header>

            <div id="loginAlert" class="alert alert-danger d-none rounded-4 text-center small" role="alert"></div>

            <form id="loginForm" class="needs-validation auth-neutral-validation" novalidate>

                <div class="form-floating mb-3">
                    <input id="correo" name="correo" type="email" class="form-control rounded-4" data-i18n-placeholder="placeholder_login_email" placeholder="correo@ejemplo.com" autocomplete="username" required>
                    <label for="correo" class="text-secondary" data-i18n="label_email">Correo electrónico</label>
                    <div class="invalid-feedback px-2" data-i18n="validation_email_required">Ingresa un correo válido para continuar.</div>
                </div>

                <div class="mb-3">
                    <div class="input-group has-validation">
                        <div class="form-floating flex-grow-1">
                            <input id="password" name="password" type="password" class="form-control rounded-start-4 border-end-0" data-i18n-placeholder="placeholder_password" placeholder="Contraseña" autocomplete="current-password" required>
                            <label for="password" class="text-secondary" data-i18n="label_password">Contraseña</label>
                        </div>
                        <button id="togglePasswordBtn" class="btn btn-outline-secondary rounded-end-4 border-start-0 px-3 bg-white" type="button" aria-label="Toggle password visibility" data-i18n-aria-label="aria_toggle_password">
                            <i id="togglePasswordIcon" class="bi bi-eye"></i>
                        </button>
                        <div class="invalid-feedback px-2" data-i18n="validation_password_required">Ingresa tu contraseña para continuar.</div>
                    </div>
                </div>

                <div class="row align-items-center g-2 mb-3 px-1">
                    <div class="col-6">
                        <div class="form-check">
                            <input id="rememberMe" class="form-check-input" type="checkbox">
                            <label for="rememberMe" class="form-check-label text-secondary small user-select-none" data-i18n="login_remember_me">Recordar mis datos</label>
                        </div>
                    </div>
                    <div class="col-6 text-end">
                        <a id="goRecoveryLink" href="/recuperar-password.html" class="link-success small fw-semibold text-decoration-none" data-i18n="login_forgot_password">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

                <button id="loginSubmitBtn" type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold shadow-sm mt-1">
                    <span id="loginSubmitSpinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                    <span data-i18n="action_login">Iniciar sesión</span>
                </button>
            </form>
        </div>

        <div class="card-footer bg-light border-top-0 px-4 py-3 text-center rounded-bottom-5">
            <p class="mb-0 text-secondary small">
                <span data-i18n="login_no_account">¿No tienes una cuenta?</span>
                <a id="goRegisterLink" href="/registro.html" class="link-success fw-bold text-decoration-none ms-1" data-i18n="login_register_here">Regístrate aquí</a>
            </p>
        </div>
    </section>
</main>

<script src="/js/common.js" defer></script>
<script src="/js/login.js" defer></script>
</body>
</html>
