<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerLink | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="peerlink-body" data-i18n-title="login_title">
<main class="container auth-shell d-flex align-items-center py-5">
    <div class="row g-4 align-items-stretch w-100">
        <div class="col-lg-6">
            <section class="hero-card rounded-4 shadow-sm p-4 p-lg-5 h-100">
                <p class="text-uppercase small fw-semibold mb-2" data-i18n="brand">PeerLink</p>
                <h1 class="display-6 fw-bold mb-3" data-i18n="login_hero_title">Inicia sesión en el sistema de tutorías</h1>
                <p class="lead mb-4" data-i18n="login_hero_desc">Accede a tu panel como administrador, tutor o estudiante.</p>
                <div class="btn-group btn-group-sm" role="group">
                    <button class="btn btn-outline-light lang-btn" data-lang="es" type="button">ES</button>
                    <button class="btn btn-outline-light lang-btn" data-lang="en" type="button">EN</button>
                    <button class="btn btn-outline-light lang-btn" data-lang="pt" type="button">PT</button>
                </div>
            </section>
        </div>
        <div class="col-lg-6">
            <section class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-4 p-lg-5">
                    <h2 class="h3 mb-4" data-i18n="login_heading">Login</h2>
                    <form id="loginForm" class="row g-3">
                        <div class="col-12">
                            <label for="correo" class="form-label" data-i18n="label_email">Correo</label>
                            <input id="correo" name="correo" type="email" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label for="password" class="form-label" data-i18n="label_password">Contraseña</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-success" data-i18n="action_login">Iniciar sesión</button>
                        </div>
                    </form>
                    <p class="mt-4 mb-0 text-secondary">
                        <span data-i18n="login_no_account">¿No tienes cuenta?</span>
                        <a id="goRegistroLink" href="/registro.html" class="link-success" data-i18n="login_register_here">Regístrate aquí</a>
                    </p>
                </div>
            </section>
        </div>
    </div>
</main>
<script src="/js/common.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
