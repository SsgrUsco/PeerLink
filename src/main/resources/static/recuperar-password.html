<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerLink | Recuperar acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="peerlink-body" data-i18n-title="forgot_password_title">
<main class="container auth-shell d-flex align-items-center py-5">
    <div class="row justify-content-center w-100">
        <div class="col-lg-7">
            <section class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
                        <div>
                            <h1 class="h2 mb-1" data-i18n="forgot_password_title">Recuperar acceso</h1>
                            <p class="text-secondary mb-0" data-i18n="forgot_password_desc">En esta version, la recuperacion se gestiona con soporte o administracion. Dejanos tu correo y te mostraremos los siguientes pasos.</p>
                        </div>
                        <div class="btn-group btn-group-sm" role="group">
                            <button class="btn btn-outline-success lang-btn" data-lang="es" type="button">ES</button>
                            <button class="btn btn-outline-success lang-btn" data-lang="en" type="button">EN</button>
                            <button class="btn btn-outline-success lang-btn" data-lang="pt" type="button">PT</button>
                        </div>
                    </div>
                    <div class="section-note mb-4">
                        <p class="mb-0" data-i18n="forgot_password_note">Si ya tienes una sesion activa, primero cierra sesion para evitar confusiones con el cambio de cuenta.</p>
                    </div>
                    <form id="recoveryForm" class="row g-3">
                        <div class="col-12">
                            <label for="recoveryCorreo" class="form-label" data-i18n="label_email">Correo</label>
                            <input id="recoveryCorreo" type="email" class="form-control" data-i18n-placeholder="placeholder_email" placeholder="Tu correo institucional o de acceso" required>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-success" data-i18n="forgot_password_action">Solicitar ayuda</button>
                        </div>
                    </form>
                    <p class="mt-4 mb-0 text-secondary">
                        <a id="backToLoginLink" href="/login.html" class="link-success" data-i18n="forgot_password_back">Volver al login</a>
                    </p>
                </div>
            </section>
            <section class="card border-0 shadow-sm mt-4">
                <div class="card-header bg-white border-0 p-4">
                    <h2 class="h4 mb-0" data-i18n="console_title">Consola</h2>
                </div>
                <div class="card-body pt-0 px-4 pb-4">
                    <pre id="consoleOutput" class="console-output"></pre>
                </div>
            </section>
        </div>
    </div>
</main>
<script src="/js/common.js"></script>
<script src="/js/recuperar-password.js"></script>
</body>
</html>
