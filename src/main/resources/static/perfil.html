<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerLink | Mi Perfil</title>
    <link rel="icon" href="/img/peerlink.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
              crossorigin="anonymous">
    </noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="peerlink-body bg-light" data-i18n-title="profile_title">

<div id="navbarContainer"></div>

<main class="container-xxl py-4 py-lg-5">

    <header class="bg-white rounded-5 shadow-sm p-4 p-lg-5 mb-4 border d-flex flex-column flex-md-row align-items-md-center gap-4" data-animation="fade-up">
        <div class="bg-success-subtle text-success rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 mx-auto mx-md-0" style="width: 80px; height: 80px;">
            <i class="bi bi-person-badge fs-1"></i>
        </div>
        <div class="text-center text-md-start flex-grow-1">
            <h1 class="display-6 fw-bold mb-2 text-dark" data-i18n="profile_heading">Mi perfil</h1>
            <p class="lead mb-0 text-secondary" data-i18n="profile_desc">Consulta y actualiza tus datos de cuenta sin salir de la plataforma.</p>
        </div>
        <a id="profileBackToPanelBtn" class="btn btn-outline-dark rounded-pill px-4 fw-medium ms-md-auto d-inline-flex align-items-center justify-content-center gap-2" href="/">
            <i class="bi bi-columns-gap"></i><span data-i18n="landing_panel_cta">Ir a mi panel</span>
        </a>
    </header>

    <div id="profileFeedback" class="hidden mb-4"></div>

    <div class="row g-4" data-animation="fade-up">

        <div class="col-lg-7">
            <section class="card border border-light-subtle rounded-5 shadow-sm h-100 bg-white overflow-hidden">
                <div class="card-header bg-white border-bottom p-4 d-flex align-items-center gap-3">
                    <div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-person-vcard fs-5"></i>
                    </div>
                    <h2 class="h5 fw-bold mb-0 text-dark" data-i18n="profile_info_title">Datos de la cuenta</h2>
                </div>

                <div class="card-body p-4 p-lg-5">
                    <form id="profileForm" class="row g-4">
                        <div class="col-12">
                            <div class="form-floating">
                                <input id="perfilNombre" type="text" class="form-control rounded-4 bg-light" placeholder="Nombre completo" required>
                                <label for="perfilNombre" class="text-secondary" data-i18n="label_full_name">Nombre completo</label>
                            </div>
                        </div>

                        <div class="col-md-8">
                            <div class="form-floating">
                                <input id="perfilCorreo" type="email" class="form-control rounded-4 bg-light" placeholder="Correo electrónico" required>
                                <label for="perfilCorreo" class="text-secondary" data-i18n="label_email">Correo</label>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-floating">
                                <input id="perfilRol" type="text" class="form-control rounded-4 text-muted fw-semibold" style="background-color: #e9ecef; cursor: not-allowed;" placeholder="Rol" readonly>
                                <label for="perfilRol" class="text-secondary" data-i18n="label_role">Rol asignado</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="d-flex align-items-start gap-3 p-3 bg-warning-subtle text-warning-emphasis rounded-4 small border border-warning-subtle">
                                <i class="bi bi-info-circle-fill mt-1"></i>
                                <p class="mb-0 lh-sm" data-i18n="profile_role_hint">Tu rol se asigna desde la administración y no puede modificarse desde este panel.</p>
                            </div>
                        </div>

                        <div class="col-12 pt-2 d-grid d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-success btn-lg rounded-pill px-5 fw-medium shadow-sm d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-floppy"></i> <span data-i18n="profile_save">Guardar cambios</span>
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </div>

        <div class="col-lg-5">
            <section class="card border border-light-subtle rounded-5 shadow-sm bg-white overflow-hidden">
                <div class="card-header bg-white border-bottom p-4 d-flex align-items-center gap-3">
                    <div class="bg-danger-subtle text-danger rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-shield-lock fs-5"></i>
                    </div>
                    <h2 class="h5 fw-bold mb-0 text-dark" data-i18n="profile_password_title">Cambiar contraseña</h2>
                </div>

                <div class="card-body p-4 p-lg-5">
                    <form id="passwordForm" class="row g-4">
                        <div class="col-12">
                            <div class="form-floating">
                                <input id="passwordActual" type="password" class="form-control rounded-4 bg-light" placeholder="Contraseña actual" required>
                                <label for="passwordActual" class="text-secondary" data-i18n="profile_current_password">Contraseña actual</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-floating">
                                <input id="passwordNueva" type="password" class="form-control rounded-4 bg-light" placeholder="Nueva contraseña" required>
                                <label for="passwordNueva" class="text-secondary" data-i18n="profile_new_password">Nueva contraseña</label>
                            </div>
                        </div>

                        <div class="col-12 pt-2 d-grid">
                            <button type="submit" class="btn btn-dark btn-lg rounded-pill fw-medium shadow-sm d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-key"></i> <span data-i18n="profile_password_save">Actualizar contraseña</span>
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>

</main>

<script src="/js/common.js" defer></script>
<script src="/js/page-shell.js" defer></script>
<script src="/js/perfil.js" defer></script>
</body>
</html>
