<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerLink | Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="peerlink-body" data-i18n-title="profile_title">
<div id="navbarContainer"></div>
<main class="container-xxl py-4">
    <section class="hero-card rounded-4 shadow-sm p-4 p-lg-5 mb-4">
        <h1 class="display-6 fw-bold mb-3" data-i18n="profile_heading">Mi perfil</h1>
        <p class="lead mb-0" data-i18n="profile_desc">Consulta y actualiza tus datos de cuenta sin salir de la plataforma.</p>
    </section>

    <div class="row g-4">
        <div class="col-lg-7">
            <section class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-0 p-4">
                    <h2 class="h4 mb-0" data-i18n="profile_info_title">Datos de la cuenta</h2>
                </div>
                <div class="card-body pt-0 px-4 pb-4">
                    <form id="profileForm" class="row g-3">
                        <div class="col-12">
                            <label for="perfilNombre" class="form-label" data-i18n="label_full_name">Nombre completo</label>
                            <input id="perfilNombre" type="text" class="form-control" required>
                        </div>
                        <div class="col-md-8">
                            <label for="perfilCorreo" class="form-label" data-i18n="label_email">Correo</label>
                            <input id="perfilCorreo" type="email" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label for="perfilRol" class="form-label" data-i18n="label_role">Rol</label>
                            <input id="perfilRol" type="text" class="form-control" readonly>
                        </div>
                        <div class="col-12">
                            <div class="section-note">
                                <p class="mb-0" data-i18n="profile_role_hint">Tu rol se asigna desde la administracion y no puede modificarse desde este panel.</p>
                            </div>
                        </div>
                        <div class="col-12 d-grid d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-success" data-i18n="profile_save">Guardar cambios</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
        <div class="col-lg-5">
            <section class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 p-4">
                    <h2 class="h4 mb-0" data-i18n="profile_password_title">Cambiar contrasena</h2>
                </div>
                <div class="card-body pt-0 px-4 pb-4">
                    <form id="passwordForm" class="row g-3">
                        <div class="col-12">
                            <label for="passwordActual" class="form-label" data-i18n="profile_current_password">Contrasena actual</label>
                            <input id="passwordActual" type="password" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label for="passwordNueva" class="form-label" data-i18n="profile_new_password">Nueva contrasena</label>
                            <input id="passwordNueva" type="password" class="form-control" required>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-outline-success" data-i18n="profile_password_save">Actualizar contrasena</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <section class="card border-0 shadow-sm mt-4">
        <div class="card-header bg-white border-0 p-4">
            <h2 class="h4 mb-0" data-i18n="console_title">Consola</h2>
        </div>
        <div class="card-body pt-0 px-4 pb-4">
                    <pre id="consoleOutput" class="console-output"></pre>
                </div>
            </section>
</main>
<script src="/js/common.js"></script>
<script src="/js/perfil.js"></script>
</body>
</html>
