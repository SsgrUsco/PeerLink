<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerLink | Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="peerlink-body" data-i18n-title="register_title">
<main class="container auth-shell d-flex align-items-center py-5">
    <div class="row justify-content-center w-100">
        <div class="col-xl-8">
            <section class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
                        <div>
                            <h1 class="h2 mb-1" data-i18n="register_heading">Registro</h1>
                            <p class="text-secondary mb-0" data-i18n="register_subtitle">Crea una cuenta como estudiante o tutor.</p>
                        </div>
                        <div class="btn-group btn-group-sm" role="group">
                            <button class="btn btn-outline-success lang-btn" data-lang="es" type="button">ES</button>
                            <button class="btn btn-outline-success lang-btn" data-lang="en" type="button">EN</button>
                            <button class="btn btn-outline-success lang-btn" data-lang="pt" type="button">PT</button>
                        </div>
                    </div>

                    <form id="registerForm" class="row g-3">
                        <div class="col-12">
                            <label for="nombreCompleto" class="form-label" data-i18n="label_full_name">Nombre completo</label>
                            <input id="nombreCompleto" name="nombreCompleto" type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="correo" class="form-label" data-i18n="label_email">Correo</label>
                            <input id="correo" name="correo" type="email" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="password" class="form-label" data-i18n="label_password">Contraseña</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="rol" class="form-label" data-i18n="label_role">Rol</label>
                            <select id="rol" name="rol" class="form-select" required>
                                <option value="ESTUDIANTE">ESTUDIANTE</option>
                                <option value="TUTOR">TUTOR</option>
                            </select>
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-success" data-i18n="action_register">Registrarse</button>
                        </div>
                    </form>

                    <p class="mt-4 mb-0 text-secondary">
                        <span data-i18n="register_has_account">¿Ya tienes cuenta?</span>
                        <a id="goLoginLink" href="/login.html" class="link-success" data-i18n="register_back_login">Volver al login</a>
                    </p>
                </div>
            </section>
        </div>
    </div>
</main>
<script src="/js/common.js"></script>
<script src="/js/registro.js"></script>
</body>
</html>
